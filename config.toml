baseurl = "http://www.example.com"
title = "policx"

theme = "coder"

DefaultContentLanguage = "en"

paginate = 20

pygmentsstyle = "b2"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true
pygmentsUseClasses = true

disqusShortname = "policx"

[params]
    author = "Yusuke Ishimi"
    description = "Yusuke Ishimi's personal website"
    keywords = "blog,developer,personal"
    info = "WEB AND APPS ENGINEER"
    avatarurl = "images/avatar.jpg"
    footercontent = "Enter a text here."
    fixedbarContent = "Do you want to know me more private?→"
    fixedbarContentAfter = "Thank You! Please share it if you like it→"

    hideCredits = false
    hideCopyright = false

    # Bottom sns share
    snsShare = true
    # Popular sns share
    # if you want add sns. please message!
    enableTwitterShare = true
    enableFacebookShare = true
    enableHatenaShare = true
    enableLineShare = true

    thumbnail = "images/tn.png"

    # Custom CSS
    custom_css = []

    # Alignment of Mobile Menu items
    itemscentered = true

    # RTL support
    rtl = false

    langseparator = "|"

[[params.social]]
    name = "Github"
    weight = 1
    url = "https://github.com/naro143/"
[[params.social]]
    name = "Twitter"
    weight = 2
    url = "https://twitter.com/naro143/"
[[params.social]]
    name = "LinkedIn"
    weight = 3
    url = "https://www.linkedin.com/in/naro143/"

[languages]
    [languages.en]
        languagecode = "en"
        languagename = "English" # The language name to be displayed in the selector.
        title = "POLICX"

        # You can configure the theme parameter for each language.
        [languages.en.params]
            author = "policx"
            info = "WEB AND APPS ENGINEER"
            description = "Yusuke Ishimi's personal website"
            keywords = "blog,developer,personal"

        [languages.en.menu] # It is possible to change the menu too.

            [[languages.en.menu.main]]
                name = "About"
                weight = 1.0
                url = "about"

            [[languages.en.menu.main]]
                name = "Blog"
                weight = 2.0
                url = "posts"

            [[languages.en.menu.main]]
                name = "Projects"
                weight = 3
                url = "projects"
            [[languages.en.menu.main]]
                name = "Contact me"
                weight = 5
                url = "contact"


    [languages.zh]
        languagecode = "zh"
        languagename = "中文"
        title = "江湖"
        fixedbarContent = "你想更了解我吗？→点击！"
        fixedbarContentAfter = "谢谢！ 如果你喜欢，请分享→"

        
        [languages.zh.params]
            author = "江湖"
            description = "江湖远，庙堂高"
            keywords = "blog,developer,strona domowa"
            info = "江湖远，庙堂高"

        [languages.zh.menu]
            [[languages.zh.menu.main]]
                name = "博客"
                weight = 1.0
                url = "zh/posts"
            [[languages.zh.menu.main]]
                name = "项目"
                weight = 2
                url = "zh/projects"
            [[languages.zh.menu.main]]
                name = "联系"
                weight = 3
                url = "zh/contact"
            [[languages.zh.menu.main]]
