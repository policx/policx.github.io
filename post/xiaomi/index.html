          <article class="post">
            <h2 class="post-title">
              小米
            </h2>
            <div class="post-info">
              <time class="post-time">
                · 2014-09-20 ·
              </time>
              
            </div>
            
            <div class="post-content">
              <p>昨天，接到了小米的电话，这个刚刚满二十岁小伙子说自己有些感到孤单，我半开玩笑的说：去谈恋爱吧。
二十岁，一个多少人羡慕的年龄，我在二十岁的时候，还在象牙塔中读书，小米已然工作了一年。话语中他流露出与社会间的不完全融入，苦了他了。
惭愧的是我写下这段文字的时候，我并没有能够给他足够的可行性建议，更多的是一个倾听者。
我感谢他能在不如意的时候想到我，</p>
